upstream backend_upstream {
    server ${BACKEND_HOST};
    keepalive 32;        # reuse connections — avoids TCP handshake per API request
    keepalive_requests 1000;
    keepalive_time 1h;
    keepalive_timeout 75s;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Tune worker connections
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;

    # Gzip compression — for static assets and proxied API responses
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA routing — serve index.html for all non-asset paths
    location / {
        try_files $uri $uri/ /index.html;

        location ~* \.html$ {
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }

    # Cache static assets aggressively (CRA uses content hashes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Proxy /api/* to backend with keepalive upstream
    location /api {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";          # required for keepalive
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    15s;
        proxy_next_upstream   error timeout;       # failover to other backend pod
        proxy_next_upstream_tries 2;
    }

    # Proxy /health to backend
    location /health {
        proxy_pass         http://backend_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
        access_log off;
    }

    # Nginx-only liveness probe — does not depend on backend
    location /nginx-health {
        access_log off;
        return 200 'OK\n';
        add_header Content-Type text/plain;
    }
}
